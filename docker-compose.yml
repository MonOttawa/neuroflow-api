services:
  neuroflow:
    image: ghcr.io/monottawa/neuroflow-api:latest
    pull_policy: always
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      DB_PATH: /data/neuroflow.db
      CORS_ORIGIN: "*"
    env_file:
      - .env
    volumes:
      - neuroflow-data:/data

volumes:
  neuroflow-data:
    driver: local

networks:
  dokploy-network:
    external: true
