name: Build and Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/neuroflow-api:latest
          tags: ghcr.io/${{ github.repository_owner }}/neuroflow-api:latest
          build-args: |
            GITHUB_REPOSITORY=${{ github.repository }}
          platforms: linux/amd64

      # Fix tag case: monottawa not MonOttawa
      - name: Retag image as lowercase
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/neuroflow-api:latest
          docker tag ghcr.io/${{ github.repository_owner }}/neuroflow-api:latest ghcr.io/monottawa/neuroflow-api:latest
          docker push ghcr.io/monottawa/neuroflow-api:latest
